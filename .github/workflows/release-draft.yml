name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          uv run python tools/release_draft.py prepare-body `
            --body-output "$env:RUNNER_TEMP\release-body.md"

      - name: Ensure release does not already exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view "${{ steps.meta.outputs.tag }}" --repo "${{ github.repository }}" 1> $null 2> "$env:RUNNER_TEMP\gh-release-view.err"
          $exitCode = $LASTEXITCODE
          if ($exitCode -eq 0) {
            throw "Release ${{ steps.meta.outputs.tag }} already exists."
          }
          if ($exitCode -ne 1) {
            Get-Content "$env:RUNNER_TEMP\gh-release-view.err"
            throw "Failed to query release state for ${{ steps.meta.outputs.tag }}."
          }
          $global:LASTEXITCODE = 0

      - name: Build release bundle
        run: uv run build.py build

      - name: Locate build artifact
        id: asset
        shell: pwsh
        run: |
          uv run python tools/release_draft.py find-asset `
            --version "${{ steps.meta.outputs.version }}"

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" "${{ steps.asset.outputs.asset_path }}" `
            --repo "${{ github.repository }}" `
            --draft `
            --title "${{ steps.meta.outputs.tag }}" `
            --notes-file "${{ steps.meta.outputs.body_path }}"
